<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>勤怠一覧</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <h1 class="mb-4">勤怠一覧</h1>
	
	<form th:action="@{/attendance/clock-in}" method="post" class="mb-3">
	    <button type="submit" class="btn btn-primary">
	        出勤
	    </button>
	</form>
	
	<form th:action="@{/attendance/clock-out}" method="post" class="mb-3">
	    <button type="submit" class="btn btn-danger">
	        退勤
	    </button>
	</form>

    <table class="table table-bordered table-striped">
        <tr>
            <th>ID</th>
            <th>勤務日</th>
            <th>出勤時刻</th>
            <th>退勤時刻</th>
            <th>休憩時間（分）</th>
			<th>勤務時間（分）</th>
            <th>備考</th>
			<th>編集</th>
        </tr>

        <tr th:each="record : ${records}">
            <td th:text="${record.id}"></td>
            <td th:text="${record.workDate}"></td>
            <td th:text="${record.clockInTime}"></td>
            <td th:text="${record.clockOutTime}"></td>
            <td th:text="${record.breakMinutes}"></td>
			<td th:text="${record.workingMinutes}"></td>
            <td th:text="${record.note}"></td>
			<td>
			    <a class="btn btn-sm btn-warning"
			       th:href="@{/attendance/{id}/edit(id=${record.id})}">
			        編集
			    </a>
			</td>
        </tr>
    </table>

</div>
</body>
</html>
