<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>勤怠一覧</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">勤怠一覧</h1>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-secondary">ログアウト</button>
        </form>
    </div>

    <div th:if="${param.clockInExists}" class="alert alert-warning">
        今日はすでに出勤済みです。
    </div>

    <div th:if="${param.noClockIn}" class="alert alert-warning">
        退勤するには先に出勤してください。
    </div>

    <div th:if="${param.clockOutExists}" class="alert alert-warning">
        今日はすでに退勤済みです。
    </div>

    <div th:if="${param.deleted}" class="alert alert-success">
        勤怠記録を削除しました。
    </div>

    <form th:action="@{/attendance}" method="get" class="mb-3">
        <div class="row g-2">
            <div class="col-md-3">
                <input type="date"
                       name="startDate"
                       th:value="${startDate}"
                       class="form-control">
            </div>

            <div class="col-md-3">
                <input type="date"
                       name="endDate"
                       th:value="${endDate}"
                       class="form-control">
            </div>

            <div class="col-md-3">
                <button type="submit" class="btn btn-outline-primary">
                    検索
                </button>

                <a th:href="@{/attendance}" class="btn btn-outline-secondary">
                    クリア
                </a>
            </div>
        </div>
    </form>

    <div class="d-flex gap-2 mb-3">
        <form th:action="@{/attendance/clock-in}" method="post">
            <button type="submit" class="btn btn-primary">
                出勤
            </button>
        </form>

        <form th:action="@{/attendance/clock-out}" method="post">
            <button type="submit" class="btn btn-danger">
                退勤
            </button>
        </form>
    </div>

    <p class="fw-bold">
        合計勤務時間:
        <span th:text="${totalWorkingHours}"></span>時間
        <span th:text="${remainingMinutes}"></span>分
    </p>

    <table class="table table-bordered table-striped">
        <tr>
            <th>ID</th>
            <th>勤務日</th>
            <th>出勤時刻</th>
            <th>退勤時刻</th>
            <th>休憩時間(分)</th>
            <th>勤務時間(分)</th>
            <th>備考</th>
            <th>編集</th>
        </tr>

        <tr th:each="record : ${records}">
            <td th:text="${record.id}"></td>
            <td th:text="${record.workDate}"></td>
            <td th:text="${record.clockInTime}"></td>
            <td th:text="${record.clockOutTime}"></td>
            <td th:text="${record.breakMinutes}"></td>
            <td th:text="${record.workingMinutes}"></td>
            <td th:text="${record.note}"></td>
            <td>
                <a class="btn btn-sm btn-warning"
                   th:href="@{/attendance/{id}/edit(id=${record.id})}">
                    編集
                </a>
            </td>
        </tr>
    </table>

</div>
</body>
</html>
