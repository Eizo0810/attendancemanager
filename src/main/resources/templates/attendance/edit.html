<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>勤怠編集</title>
<link th:href="@{/css/bootstrap-local.css}" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <h1 class="mb-4">勤怠編集</h1>

    <form th:action="@{/attendance/{id}/edit(id=${record.id})}" method="post">

        <div class="mb-3">
            <label class="form-label">休憩時間(分)</label>
            <input type="number"
                   name="breakMinutes"
                   th:value="${record.breakMinutes}"
                   class="form-control"
                   min="0">
        </div>

        <div class="mb-3">
            <label class="form-label">備考</label>
            <textarea name="note"
                      th:text="${record.note}"
                      class="form-control"
                      rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">更新</button>

        <a th:href="@{/attendance}" class="btn btn-secondary">戻る</a>
    </form>

    <form th:action="@{/attendance/{id}/delete(id=${record.id})}"
          method="post"
          class="mt-3"
          onsubmit="return confirm('この勤怠記録を削除しますか？');">
        <button type="submit" class="btn btn-outline-danger">削除</button>
    </form>

</div>
</body>
</html>
