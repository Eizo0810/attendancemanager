<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>勤怠編集</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <h1 class="mb-4">勤怠編集</h1>

    <form th:action="@{/attendance/{id}/edit(id=${record.id})}" method="post">

        <div class="mb-3">
            <label class="form-label">休憩時間（分）</label>
            <input type="number"
                   name="breakMinutes"
                   th:value="${record.breakMinutes}"
                   class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">更新</button>

        <a th:href="@{/attendance}" class="btn btn-secondary">戻る</a>

    </form>

</div>
</body>
</html>
